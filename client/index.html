<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Santosh Salon Queue lets customers book salon services, choose time slots, pay online, and track live queue tokens."
    />
    <meta name="theme-color" content="#06100e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Santosh Salon" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Santosh Salon" />
    <meta property="og:title" content="Santosh Salon Queue" />
    <meta
      property="og:description"
      content="Book grooming services, choose live time slots, and track your salon turn with Santosh Salon Queue."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://santosh-salon.web.app/" />
    <meta property="og:image" content="https://santosh-salon.web.app/assets/salon-hero.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://images.pexels.com" />
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" />
    <link rel="preconnect" href="https://lh3.googleusercontent.com" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="canonical" href="https://santosh-salon.web.app/" />
    <title>Santosh Salon Queue</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "HairSalon",
        "name": "Santosh Salon",
        "url": "https://santosh-salon.web.app/",
        "image": "https://santosh-salon.web.app/assets/salon-hero.png",
        "telephone": "+91 98765 43210",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Main Market Road, Near City Chowk",
          "addressCountry": "IN"
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": [
              "Monday",
              "Tuesday",
              "Wednesday",
              "Thursday",
              "Friday",
              "Saturday",
              "Sunday"
            ],
            "opens": "06:00",
            "closes": "23:00"
          }
        ],
        "priceRange": "₹₹"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
